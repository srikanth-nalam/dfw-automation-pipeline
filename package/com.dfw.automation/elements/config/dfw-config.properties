# =============================================================================
# DFW Automation Pipeline — vRO Configuration Properties
# =============================================================================
# This file is loaded by ConfigLoader.js at workflow startup.
# Deploy to: vRO > Configuration > Property Pages > com.dfw.automation
#
# Vault references use the pattern {{vault:secret/path}} and are resolved
# at runtime by the vRO secrets manager. Never store plain-text credentials.
# =============================================================================

# -----------------------------------------------------------------------------
# Site Endpoints — Per-site vCenter and NSX-T Manager URLs
# -----------------------------------------------------------------------------
site.NDCNG.vcenter.url=https://vcenter-ndcng.company.internal
site.NDCNG.nsx.url=https://nsx-manager-ndcng.company.internal
site.NDCNG.nsx.global.url=https://nsx-global-ndcng.company.internal

site.TULNG.vcenter.url=https://vcenter-tulng.company.internal
site.TULNG.nsx.url=https://nsx-manager-tulng.company.internal
site.TULNG.nsx.global.url=https://nsx-global-tulng.company.internal

# -----------------------------------------------------------------------------
# Authentication — Vault References (resolved at runtime)
# -----------------------------------------------------------------------------
auth.vcenter.username={{vault:secret/vro/vcenter/username}}
auth.vcenter.password={{vault:secret/vro/vcenter/password}}
auth.nsx.username={{vault:secret/vro/nsx/username}}
auth.nsx.password={{vault:secret/vro/nsx/password}}
auth.nsx.global.username={{vault:secret/vro/nsx-global/username}}
auth.nsx.global.password={{vault:secret/vro/nsx-global/password}}
auth.snow.callback.token={{vault:secret/vro/snow/callback-token}}

# -----------------------------------------------------------------------------
# ServiceNow Integration
# -----------------------------------------------------------------------------
snow.instance.url=https://snow.company.com
snow.callback.path=/api/now/v1/dfw/callback
snow.api.version=v1

# -----------------------------------------------------------------------------
# Retry Configuration
# -----------------------------------------------------------------------------
retry.intervals=5000,15000,45000
retry.maxRetries=3

# -----------------------------------------------------------------------------
# Circuit Breaker Configuration
# -----------------------------------------------------------------------------
circuitBreaker.failureThreshold=5
circuitBreaker.resetTimeout=60000
circuitBreaker.windowSize=300000

# -----------------------------------------------------------------------------
# HTTP Client Configuration
# -----------------------------------------------------------------------------
http.timeout=30000
http.followRedirects=true
http.maxRedirects=5

# -----------------------------------------------------------------------------
# Rate Limiter Configuration
# -----------------------------------------------------------------------------
rateLimiter.nsx.tokensPerSecond=10
rateLimiter.nsx.burstSize=20
rateLimiter.vcenter.tokensPerSecond=15
rateLimiter.vcenter.burstSize=30
rateLimiter.snow.tokensPerSecond=5
rateLimiter.snow.burstSize=10

# -----------------------------------------------------------------------------
# Callback Configuration
# -----------------------------------------------------------------------------
callback.maxRetries=3
callback.retryIntervals=2000,5000,10000

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------
logging.minLevel=INFO
logging.includeCorrelationId=true
logging.includeTimestamp=true

# -----------------------------------------------------------------------------
# Tag Governance
# -----------------------------------------------------------------------------
tags.required=Region,SecurityZone,Environment,AppCI,SystemRole
tags.driftScan.autoRemediate=false
tags.driftScan.schedule=0 2 * * *
tags.untaggedScan.schedule=0 3 * * *

# -----------------------------------------------------------------------------
# Rule Governance
# -----------------------------------------------------------------------------
rules.review.lookAheadDays=30
rules.review.autoDeactivateExpired=false
rules.review.schedule=0 4 * * 1
rules.maxExpirationDays=365

# -----------------------------------------------------------------------------
# Bulk Operations
# -----------------------------------------------------------------------------
bulk.batchSize=50
bulk.delayBetweenBatchesMs=2000
bulk.maxVmsPerRequest=500

# -----------------------------------------------------------------------------
# Dead Letter Queue
# -----------------------------------------------------------------------------
dlq.maxRetries=3
dlq.retentionDays=30
dlq.alertThreshold=10

# -----------------------------------------------------------------------------
# Quarantine
# -----------------------------------------------------------------------------
quarantine.policyPriority=1
quarantine.ruleName.prefix=QUARANTINE-EMERGENCY
quarantine.notifySecOps=true
